    <script>
      // GitHub Pages SPA redirect decoder: restores the real path from the
      // query string set by 404.html before React Router mounts.
      (function () {
        var l = window.location;
        if (l.search.indexOf('?p=/') === 0 || l.search.indexOf('&p=/') > -1) {
          var q = l.search.slice(1).split('&').reduce(function (acc, kv) {
            var i = kv.indexOf('=');
            acc[kv.slice(0, i)] = kv.slice(i + 1);
            return acc;
          }, {});
          if (q.p !== undefined) {
            var newPath =
              l.pathname.replace(/\/$/, '') +
              q.p.replace(/~and~/g, '&') +
              (q.q ? '?' + q.q.replace(/~and~/g, '&') : '') +
              l.hash;
            window.history.replaceState(null, '', newPath);
          }
        }
      })();
